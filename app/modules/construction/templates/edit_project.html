{% extends "layout.html" %}
{% block content %}

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />

<div class="container-fluid mt-4">
    <div class="row justify-content-center mb-5">
        <div class="col-lg-8">
            <div class="card shadow-lg border-0 border-top border-4 border-warning" style="border-radius: 12px;">
                <div class="card-header bg-white border-0 py-4 mt-2">
                    <div class="d-flex justify-content-between align-items-center px-2">
                        <div class="d-flex align-items-center">
                            <div class="bg-warning bg-opacity-10 p-3 rounded-circle me-3">
                                <i class="fas fa-edit text-warning fs-4"></i>
                            </div>
                            <h4 class="fw-bold mb-0" style="color: var(--navy);">Edit Project Details</h4>
                        </div>
                        <a href="{{ url_for('projects.view_projects') }}" class="btn btn-sm btn-outline-secondary shadow-sm">
                            <i class="fas fa-arrow-left me-1"></i> Back to Projects
                        </a>
                    </div>
                </div>

                <div class="card-body px-4 pb-4 bg-light" style="border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;">
                    <div class="alert alert-warning bg-warning bg-opacity-10 border-0 text-dark small d-flex align-items-center mb-4 rounded-3 shadow-sm">
                        <i class="fas fa-info-circle fs-4 me-3 text-warning"></i>
                        <div>
                            Modifying records for <strong>{{ project.project_name }}</strong>. <br>
                            <span class="opacity-75">Updates made here will be reflected across all cost tracking and reports.</span>
                        </div>
                    </div>

                    <form id="editProjectForm" method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold text-secondary">Project ID</label>
                                <input type="text" class="form-control bg-white fw-bold text-muted" value="{{ project.id }}" readonly>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Project Name <span class="text-danger">*</span></label>
                                <input type="text" name="project_name" class="form-control fw-bold" required value="{{ project.project_name }}">
                            </div>
                            
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Sector <span class="text-danger">*</span></label>
                                <select name="sector" class="form-select search-select" required>
                                    <option value="">Search Sector...</option>
                                    {% for sector in sectors %}
                                    <option value="{{ sector }}" {% if project.sector == sector %}selected{% endif %}>{{ sector }}</option>
                                    {% endfor %}
                                    {% if project.sector and project.sector not in sectors %}
                                    <option value="{{ project.sector }}" selected>{{ project.sector }}</option>
                                    {% endif %}
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Firm Name</label>
                                <input type="text" name="firm_name" class="form-control" value="{{ project.firm_name or '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Tender ID</label>
                                <input type="text" name="tender_id" class="form-control" value="{{ project.tender_id or '' }}">
                            </div>

                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-bold">NOA Date</label>
                                <input type="date" name="noa_date" class="form-control" value="{{ project.noa_date or '' }}">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-bold">Work Order Year</label>
                                <input type="text" name="work_order_year" class="form-control" value="{{ project.work_order_year or '' }}">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-bold">Contract Price (৳)</label>
                                <input type="number" step="0.01" name="contract_price" class="form-control fw-bold text-success" value="{{ project.contract_price or '' }}">
                            </div>
                            
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-bold">Project Status</label>
                                <select name="status" id="projectStatus" class="form-select">
                                    <option value="Running" {% if project.status == 'Running' %}selected{% endif %}>Running</option>
                                    <option value="Completed" {% if project.status == 'Completed' %}selected{% endif %}>Completed</option>
                                    <option value="On Hold" {% if project.status == 'On Hold' %}selected{% endif %}>On Hold</option>
                                </select>
                            </div>

                            <div class="col-md-3 mb-3" id="completionDateGroup">
                                <label class="form-label fw-bold">Completion Date <span class="text-danger">*</span></label>
                                <input type="date"
                                       name="completion_date"
                                       id="completionDate"
                                       class="form-control"
                                       value="{{ project.completion_date or '' }}">
                            </div>

                            <div class="col-12 mb-4">
                                <label class="form-label fw-bold">Full Site Address <span class="text-danger">*</span></label>
                                <textarea name="address" class="form-control" rows="2" required>{{ project.address }}</textarea>
                            </div>

                            <div class="col-12 mb-4">
                                <label class="form-label fw-bold">Additional Details</label>
                                <textarea name="additional_details" class="form-control" rows="2">{{ project.additional_details or '' }}</textarea>
                            </div>
                        </div>

                        <div class="mb-3 border-top pt-4 mt-2">
                            <label class="form-label fw-bold">
                                <i class="fas fa-shield-alt me-1 text-danger"></i>
                                Confirm Your Password <span class="text-danger">*</span>
                            </label>
                            <input type="password" 
                                   name="confirm_password" 
                                   class="form-control border-danger js-password-toggle" 
                                   placeholder="Enter your password to authorize this change" 
                                   required>
                            <div class="form-text text-muted small mt-2">
                                Required to confirm it's really you making this change.
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold shadow-sm border-0 text-dark">
                                <i class="fas fa-save me-2"></i> UPDATE PROJECT
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="authErrorTracker" data-has-error="{{ 'true' if auth_error else 'false' }}" style="display: none;"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    // Initialize searchable dropdown
    $(document).ready(function () {
        $('.search-select').select2({
            theme: 'bootstrap-5',
            placeholder: 'Type to search sector...',
            allowClear: true,
            width: '100%'
        });
    });

    // --- Auth Error SweetAlert ---
    const errorTracker = document.getElementById('authErrorTracker');
    if (errorTracker && errorTracker.dataset.hasError === 'true') {
        window.addEventListener('DOMContentLoaded', function() {
            Swal.fire({
                title: 'Authentication Failed!',
                text: 'The password you entered is incorrect. No changes were saved.',
                icon: 'error',
                confirmButtonColor: '#e63946',
                confirmButtonText: 'Try Again',
                backdrop: 'rgba(26, 42, 108, 0.4)'
            });
        });
    }

    const statusSelect = document.getElementById('projectStatus');
    const completionDateGroup = document.getElementById('completionDateGroup');
    const completionDateInput = document.getElementById('completionDate');

    function syncCompletionDateField() {
        const isCompleted = statusSelect.value === 'Completed';
        completionDateGroup.style.display = isCompleted ? '' : 'none';
        completionDateInput.required = isCompleted;
        if (!isCompleted) {
            completionDateInput.value = '';
        }
    }

    statusSelect.addEventListener('change', syncCompletionDateField);
    syncCompletionDateField();

    // --- Normal Confirmation Alert ---
    document.getElementById('editProjectForm').addEventListener('submit', function (e) {
        e.preventDefault(); 
        const form = this; 
        const projectName = document.querySelector('input[name="project_name"]').value;

        Swal.fire({
            title: 'Confirm Project Updates?',
            html: `You are modifying the registry details for <strong class="text-warning">${projectName}</strong>.`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ffc107',
            cancelButtonColor: '#6c757d',
            confirmButtonText: '<i class="fas fa-check-circle"></i> Yes, update it!',
            cancelButtonText: 'Cancel',
            backdrop: `rgba(26, 42, 108, 0.4)`
        }).then((result) => {
            if (result.isConfirmed) {
                form.submit(); 
            }
        });
    });
</script>

{% endblock %}
