{% extends "layout.html" %}
{% block content %}

<div class="row justify-content-center mt-4 mb-5">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-dark text-white p-3">
                <h5 class="mb-0 fw-bold"><i class="fas fa-key text-warning me-2"></i>Change Password</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Current Password</label>
                        <input type="password" name="current_password" class="form-control js-password-toggle" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">New Password</label>
                        <input type="password" name="new_password" class="form-control js-password-toggle" minlength="8" required>
                        <div class="form-text">Use at least 8 characters.</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Confirm New Password</label>
                        <input type="password" name="confirm_password" class="form-control js-password-toggle" minlength="8" required>
                    </div>

                    <div class="d-flex flex-wrap gap-2">
                        <button type="submit" class="btn btn-warning fw-bold">
                            <i class="fas fa-save me-1"></i> Update Password
                        </button>
                        <a href="{{ url_for('account.profile') }}" class="btn btn-outline-secondary fw-bold">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
